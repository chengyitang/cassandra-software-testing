name: Java CI
on:
  push:
    branches: [ "trunk" ]
  pull_request:
    branches: [ "trunk" ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install ant -y
        
    - name: Cache Ant dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.m2/repository
          ~/.ant/lib
        key: ${{ runner.os }}-ant-${{ hashFiles('**/build.xml') }}
        restore-keys: |
          ${{ runner.os }}-ant-

    - name: Build Cassandra
      run: ant jar
      
    - name: Run Unit Tests
      run: |
        ant test \
        -Dtest.name=org.apache.cassandra.cql3.statements.SelectStatementTest,org.apache.cassandra.cql3.QueryProcessorTest
